<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختصر الروابط السريع والـ QR الخاص</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --primary-blue: #0d47a1;
            --matte-red: #c0392b; /* اللون الأحمر المطفي للتوقيع */
            --bg-color: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-color);
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh; 
            margin: 0;
        }

        .container {
            background: white; 
            padding: 2.5rem; 
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            width: 90%; 
            max-width: 400px; 
            text-align: center;
        }

        input {
            width: 100%; 
            padding: 14px; 
            border: 2px solid #e2e8f0;
            border-radius: 10px; 
            margin-bottom: 20px; 
            font-size: 1rem;
            text-align: left; 
            direction: ltr; 
            outline: none;
            box-sizing: border-box;
        }

        .btn {
            background: var(--primary-blue); 
            color: white; 
            border: none;
            padding: 14px; 
            border-radius: 10px; 
            cursor: pointer;
            width: 100%; 
            font-weight: bold; 
            font-size: 1rem; 
            margin-bottom: 10px;
            transition: background 0.3s ease;
        }
        .btn:hover { background: #0a3c8c; }

        #resultArea { margin-top: 25px; display: none; }

        #qrcode { 
            display: flex; 
            justify-content: center; 
            margin: 20px 0;
        }
        #qrcode img {
            border: 1px solid #e2e8f0;
            padding: 8px;
            border-radius: 8px;
        }

        .short-url-text {
            margin: 15px 0; 
            font-weight: bold; 
            color: #2563eb; 
            font-size: 1rem; 
            word-break: break-all;
            direction: ltr;
            text-align: left;
        }

        .signature {
            margin-top: 25px; 
            font-weight: bold; 
            color: var(--matte-red);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>مختصر الروابط الخاص بك 🔗</h2>
    <p style="color: #64748b; margin-bottom: 25px; font-size: 0.95rem;">ثانوية الأمير عبدالمجيد</p>

    <input type="url" id="longUrl" placeholder="ضع الرابط الطويل هنا..." required>
    <button class="btn" onclick="makePrivateShortUrl()">اختصار وتوليد الرمز فوراً</button>

    <div id="resultArea">
        <div id="qrcode"></div>
        <div id="shortUrl" class="short-url-text"></div>
        
        <button class="btn" style="background:#10b981;" onclick="copyLink()">نسخ الرابط المختصر</button>
        <button class="btn" style="background:#4b5563;" onclick="downloadQR()">حفظ صورة الرمز</button>
    </div>

    <div class="signature">
        ✨ أ / عبد العزيز الفيفي - ثانوية الأمير عبدالمجيد 🎓
    </div>
</div>

<script>
    // دالة لتوليد كود قصير وفريد محلياً
    function generateId() {
        return Math.random().toString(36).substring(2, 7);
    }

    function makePrivateShortUrl() {
        const urlInput = document.getElementById('longUrl').value.trim();
        if (!urlInput) return alert("فضلاً ضع الرابط أولاً");

        // استخراج الرابط الأساسي للموقع الخاص بك على GitHub Pages
        const currentUrl = window.location.href.split('#')[0].split('?')[0];
        
        // توليد معرف قصير للرابط
        const shortId = generateId();
        
        // حفظ الرابط الطويل في ذاكرة المتصفح المحلية بربطه بالمعرف القصير
        localStorage.setItem(shortId, urlInput);

        // الرابط المختصر الخاص بموقعك تماماً
        const finalShortLink = `${currentUrl}?id=${shortId}`;

        document.getElementById('shortUrl').innerText = finalShortLink;
        document.getElementById('resultArea').style.display = 'block';

        // توليد الـ QR Code العادي فوراً وبثبات كامل
        const qrDiv = document.getElementById("qrcode");
        qrDiv.innerHTML = "";
        new QRCode(qrDiv, {
            text: finalShortLink,
            width: 200,
            height: 200,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.M
        });
    }

    // محرك التوجيه الذكي والمحلي: يشتغل فوراً عند فتح أي رابط مختصر
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const idParam = urlParams.get('id');
        
        if (idParam) {
            const targetUrl = localStorage.getItem(idParam);
            if (targetUrl) {
                window.location.replace(targetUrl);
            } else {
                alert("عذراً، هذا الرابط غير مسجل في النظام المحلي لهذا الجهاز أو منتهي الصلاحية.");
            }
        }
    }

    function copyLink() {
        navigator.clipboard.writeText(document.getElementById('shortUrl').innerText);
        alert("تم نسخ الرابط بنجاح!");
    }

    function downloadQR() {
        const img = document.querySelector('#qrcode img');
        if (img) {
            const link = document.createElement('a');
            link.href = img.src;
            link.download = 'QR_Code_Private.png';
            link.click();
        }
    }

    console.log("الارتباط الشرطي وحماية الملكية: أ/ عبدالعزيز الفيفي - ثانوية الأمير عبدالمجيد");
</script>

</body>
</html>
