<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختصر الروابط السريع والـ QR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --primary-blue: #0d47a1;
            --matte-red: #c0392b; /* اللون الأحمر المطفي المعتمد للتوقيع */
            --bg-color: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-color);
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh; 
            margin: 0;
        }

        .container {
            background: white; 
            padding: 2.5rem; 
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            width: 90%; 
            max-width: 400px; 
            text-align: center;
        }

        h2 { color: #1e293b; margin-bottom: 5px; }
        .sub-title { color: #64748b; margin-bottom: 25px; font-size: 0.95rem; }

        input {
            width: 100%; 
            padding: 14px; 
            border: 2px solid #e2e8f0;
            border-radius: 10px; 
            margin-bottom: 20px; 
            font-size: 1rem;
            text-align: left; 
            direction: ltr; 
            outline: none;
            box-sizing: border-box;
        }

        .btn {
            background: var(--primary-blue); 
            color: white; 
            border: none;
            padding: 14px; 
            border-radius: 10px; 
            cursor: pointer;
            width: 100%; 
            font-weight: bold; 
            font-size: 1rem; 
            margin-bottom: 10px;
            transition: background 0.3s ease;
        }
        .btn:hover { background: #0a3c8c; }

        #resultArea { 
            margin-top: 25px; 
            display: none; 
        }

        #qrcode { 
            display: flex; 
            justify-content: center; 
            margin: 20px 0;
            padding: 10px;
            background: white;
        }

        #qrcode img {
            border: 1px solid #e2e8f0;
            padding: 8px;
            border-radius: 8px;
        }

        .short-url-text {
            margin: 15px 0; 
            font-weight: bold; 
            color: #2563eb; 
            font-size: 1.05rem; 
            word-break: break-all;
        }

        .signature {
            margin-top: 25px; 
            font-weight: bold; 
            color: var(--matte-red);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>مختصر الروابط والـ QR 🔗</h2>
    <p class="sub-title">ثانوية الأمير عبدالمجيد</p>

    <input type="url" id="longUrl" placeholder="ضع الرابط الطويل هنا..." required>
    <button class="btn" onclick="generateShortAndNormalQR()">اختصار وتوليد الرمز</button>

    <div id="resultArea">
        <div id="qrcode"></div>
        
        <div id="shortUrl" class="short-url-text"></div>
        
        <button class="btn" style="background:#10b981;" onclick="copyLink()">نسخ الرابط المختصر</button>
        <button class="btn" style="background:#4b5563;" onclick="downloadQR()">حفظ صورة الرمز</button>
    </div>

    <div class="signature">
        ✨ أ / عبد العزيز الفيفي - ثانوية الأمير عبدالمجيد 🎓
    </div>
</div>

<script>
    let qrContainer = null;

    async function generateShortAndNormalQR() {
        const urlInput = document.getElementById('longUrl').value.trim();
        if (!urlInput) return alert("فضلاً ضع الرابط أولاً");

        try {
            // استخدام سيرفر TinyURL المفتوح والمستقر لتجنب مشاكل الحظر والأخطاء
            const res = await fetch(`https://tinyurl.com/api-create.php?url=${encodeURIComponent(urlInput)}`);
            if (!res.ok) throw new Error();
            const shortLink = await res.text();

            document.getElementById('shortUrl').innerText = shortLink;
            document.getElementById('resultArea').style.display = 'block';

            // مسح أي رمز سابق وتوليد رمز QR عادي كلاسيكي تماماً
            const qrDiv = document.getElementById("qrcode");
            qrDiv.innerHTML = "";
            
            qrContainer = new QRCode(qrDiv, {
                text: shortLink,
                width: 200,
                height: 200,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.M
            });

        } catch (e) {
            alert("عذراً، فشل جلب الرابط المختصر. تحقق من اتصالك بالإنترنت وحاول مجدداً.");
        }
    }

    function copyLink() {
        const text = document.getElementById('shortUrl').innerText;
        navigator.clipboard.writeText(text).then(() => {
            alert("تم نسخ الرابط المختصر بنجاح!");
        });
    }

    function downloadQR() {
        const img = document.querySelector('#qrcode img');
        if (img) {
            const link = document.createElement('a');
            link.href = img.src;
            link.download = 'QR_Code.png';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        } else {
            alert("يرجى توليد الرمز أولاً");
        }
    }

    // كود الارتباط الشرطي لحماية الملكية الفكرية في الكونسول
    console.log("الملكية الفكرية: أ/ عبدالعزيز الفيفي - ثانوية الأمير عبدالمجيد");
</script>

</body>
</html>
