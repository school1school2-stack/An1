<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختصر الروابط والـ QR الذكي</title>

    <style>
        :root {
            --primary-blue: #0d47a1;
            --school-red: #ba0000; /* اللون الأحمر الموحد بالموقع */
            --bg-color: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-color);
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh; 
            margin: 0;
        }

        .container {
            background: white; 
            padding: 2.5rem; 
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            width: 90%; 
            max-width: 400px; 
            text-align: center;
        }

        input {
            width: 100%; 
            padding: 14px; 
            border: 2px solid #e2e8f0;
            border-radius: 10px; 
            margin-bottom: 20px; 
            font-size: 1rem;
            text-align: left; 
            direction: ltr; 
            outline: none;
            box-sizing: border-box;
        }

        .btn {
            background: var(--primary-blue); 
            color: white; 
            border: none;
            padding: 14px; 
            border-radius: 10px; 
            cursor: pointer;
            width: 100%; 
            font-weight: bold; 
            font-size: 1rem; 
            margin-bottom: 10px;
            transition: background 0.3s ease;
        }
        .btn:hover { background: #0a3c8c; }

        #resultArea { 
            margin-top: 25px; 
            display: none; 
        }

        .qr-box {
            margin: 20px 0;
            padding: 10px;
            display: inline-block;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
        }

        .qr-box img {
            display: block;
            width: 200px;
            height: 200px;
        }

        .short-url-text {
            margin: 15px 0; 
            font-weight: bold; 
            color: #2563eb; 
            font-size: 1rem; 
            word-break: break-all;
            direction: ltr;
            text-align: left;
        }

        .signature {
            margin-top: 25px; 
            font-weight: bold; 
            color: var(--school-red);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>مختصر الروابط والـ QR الذكي 🔗</h2>
    <p style="color: #64748b; margin-bottom: 25px; font-size: 0.95rem;">ثانوية الأمير عبدالمجيد</p>

    <input type="url" id="longUrl" placeholder="ضع الرابط الطويل هنا..." required>
    <button class="btn" onclick="processShortener()">اختصار وتوليد الرمز فوراً</button>

    <div id="resultArea">
        <div class="qr-box">
            <img id="qrImage" src="" alt="QR Code">
        </div>
        
        <div id="shortUrl" class="short-url-text"></div>
        
        <button class="btn" style="background:#10b981;" onclick="copyLink()">نسخ الرابط المختصر</button>
        <button class="btn" style="background:#4b5563;" onclick="downloadQR()">حفظ صورة الرمز</button>
    </div>

    <div class="signature">
        ✨ أ / عبد العزيز الفيفي - ثانوية الأمير عبدالمجيد 🎓
    </div>
</div>

<script {id="protection-script"}>
    // محرك التوجيه الفوري والثابت عند فتح الرابط من قبل الطلاب
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const encodedData = urlParams.get('go');
        
        if (encodedData) {
            try {
                // فك التشفير الآمن للنصوص العربية والرموز بدون تعليق المتصفح
                const targetUrl = decodeURIComponent(escape(atob(encodedData)));
                if (targetUrl.startsWith('http://') || targetUrl.startsWith('https://')) {
                    window.location.replace(targetUrl);
                }
            } catch (e) {
                console.error("خطأ في قراءة مسار التوجيه.");
            }
        }
    }

    function processShortener() {
        const urlInput = document.getElementById('longUrl').value.trim();
        if (!urlInput) return alert("فضلاً ضع الرابط أولاً");

        try {
            // تحويل الرابط إلى كود رقمي آمن وقصير جداً متوافق مع معايير الروابط
            const safeBase64 = btoa(unescape(encodeURIComponent(urlInput)))
                .replace(/\+/g, '-')
                .replace(/\//g, '_')
                .replace(/=+$/, '');
            
            const currentBase = window.location.href.split('?')[0];
            const finalShortLink = `${currentBase}?go=${safeBase64}`;

            // تحديث رابط الصورة مباشرة من محرك جوجل لضمان عدم حدوث تعليق نهائياً
            const googleQrUrl = `https://chart.googleapis.com/chart?cht=qr&chs=300x300&chl=${encodeURIComponent(finalShortLink)}&choe=UTF-8`;
            
            document.getElementById('qrImage').src = googleQrUrl;
            document.getElementById('shortUrl').innerText = finalShortLink;
            
            // إظهار النتائج فوراً
            document.getElementById('resultArea').style.display = 'block';

        } catch (e) {
            alert("حدث خطأ أثناء المعالجة، يرجى التحقق من الرابط.");
        }
    }

    function copyLink() {
        navigator.clipboard.writeText(document.getElementById('shortUrl').innerText);
        alert("تم نسخ الرابط المختصر بنجاح!");
    }

    async function downloadQR() {
        const qrImg = document.getElementById('qrImage');
        if (!qrImg.src) return;
        try {
            // جلب الصورة وتحويلها لملف قابل للتحميل المباشر بالجوال
            const response = await fetch(qrImg.src);
            const blob = await response.blob();
            const blobUrl = URL.createObjectURL(blob);
            
            const link = document.createElement('a');
            link.href = blobUrl;
            link.download = 'Majeed_School_QR.png';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(blobUrl);
        } catch (e) {
            alert("اضغط مطولاً على صورة الرمز لحفظها في ألبوم الكاميرا.");
        }
    }

    // ارتباط شرطي لحماية الملكية الفكرية
    console.log("برمجة وتصميم: أ/ عبدالعزيز الفيفي - ثانوية الأمير عبدالمجيد");
</script>

</body>
</html>
